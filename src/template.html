<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body class="bg-dark text-light">
    <main class="container py-5">
      <div class="row">
        <div class="col-12">
          <span class="fs-2">To Do Lists</span>
          <hr />
        </div>
        <div class="row">
          <div class="col-3" id="list-nav">
            <span class="fs-4">Lists - </span>
            <ul class="nav nav-underline flex-column mb-auto">
              <li class="nav-item">
                <a
                  role="button"
                  class="nav-link link-light"
                  aria-current="page"
                >
                  <span class="ms-3">List</span>
                </a>
              </li>
            </ul>
            <hr />
            <ul class="nav nav-underline flex-column mb-auto">
              <li class="nav-item">
                <a
                  role="button"
                  class="nav-link link-light"
                  aria-current="page"
                >
                  <span class="ms-3">New List +</span>
                </a>
              </li>
              <li class="nav-item">
                <a
                  role="button"
                  class="nav-link link-light"
                  aria-current="page"
                >
                  <span class="ms-3">Log out</span>
                </a>
              </li>
            </ul>
          </div>
          <div class="col-9">
            <ul class="nav nav-underline mb-3" id="pills-tab" role="tablist">
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link link-light active me-3"
                  id="pending-tab"
                  data-bs-toggle="pill"
                  data-bs-target="#pending"
                  type="button"
                  role="tab"
                  aria-controls="completed"
                >
                  Pending Tasks
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button
                  class="nav-link link-light"
                  id="completed-tab"
                  data-bs-toggle="pill"
                  data-bs-target="#completed"
                  type="button"
                  role="tab"
                  aria-controls="pills-profile"
                >
                  Completed Tasks
                </button>
              </li>
            </ul>
            <div class="tab-content" id="pills-tabContent">
              <div
                class="tab-pane fade show active"
                id="pending"
                role="tabpanel"
                aria-labelledby="pills-home-tab"
                tabindex="0"
              >
                <div class="card w-100 mb-3" data-bs-theme="dark">
                  <div class="card-body">
                    <div class="container">
                      <div class="row">
                        <div class="col-10">
                          <h5 class="card-title">Card title </h5> 
                        </div>
                        <div class="col-2 d-flex flex-column">
                          <span class="badge rounded-pill text-bg-primary ms-auto">Primary</span>
                        </div>
                      </div>
                      <div class="row">
                        <div class="col-9">
                          <p class="card-text">
                            With supporting text below as a natural lead-in to
                            additional content.
                          </p>
                        </div>
                      </div>
                      <div class="row mt-3">
                        <div class="col-2">
                          <button type="button" class="btn btn-outline-secondary bt n-sm mt-auto">Notes</button>
                        </div>

                        <div class="col-1 offset-md-8">
                          <button type="button" class="btn btn-outline-success btn-sm">&check;</button>
                        </div>
                        <div class="col-1">
                          <button type="button" class="btn btn-outline-danger btn-sm">&#x2715;</button>
                        </div>
                      </div>
                      <div class="row mt-3">
                        <hr>
                        <div class="col-10">
                          <h5 class="card-title">Card title </h5> 
                        </div>
                        <div class="col-2 d-flex flex-column">
                          <button type="button" class="btn btn-outline-secondary btn-sm">Add note +</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div
                class="tab-pane fade"
                id="completed"
                role="tabpanel"
                aria-labelledby="pills-profile-tab"
                tabindex="0"
              >
                ...
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
